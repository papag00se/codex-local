# Codex Multi-Agent Configuration
# Per-working-directory config. Does not affect ~/.codex/config.toml.

# --- Model roles ---

[models.classifier]
endpoint = "http://192.168.0.245:8000"
model = "qwopus"
trim_budget = 65536
provider = "openai-compat"
reasoning = "off"

[models.light_reasoner]
endpoint = "http://192.168.0.245:8000"
model = "qwopus"
trim_budget = 65536
provider = "openai-compat"
reasoning = "on"

[models.light_coder]
endpoint = "http://192.168.0.245:8000"
model = "qwopus"
trim_budget = 65536
provider = "openai-compat"
reasoning = "off"

[models.compactor]
endpoint = "http://192.168.0.245:8000"
model = "qwopus"
trim_budget = 65536
provider = "openai-compat"
reasoning = "off"

[models.cloud_fast]
entries = [
    { provider = "openai", model = "gpt-5.3-codex-spark", weight = 100, reasoning = "xhigh" },
]

[models.cloud_mini]
entries = [
    { provider = "openai", model = "gpt-5.4-mini", weight = 100, reasoning = "high" },
]

[models.cloud_reasoner]
entries = [
    { provider = "anthropic", model = "sonnet-4.6", weight = 50, reasoning = "max" },
    { provider = "openai", model = "gpt-5.4", weight = 30, reasoning = "xhigh" },
    { provider = "openai", model = "gpt-5.4-mini", weight = 30, reasoning = "xhigh" },
]

[models.cloud_coder]
entries = [
    { provider = "anthropic", model = "opus-4.6", weight = 60, reasoning = "medium" },
    { provider = "openai", model = "gpt-5.4", weight = 30, reasoning = "medium" },
    { provider = "openai", model = "gpt-5.3-codex-spark", weight = 20, reasoning = "xhigh" },
]

# --- Routing ---

[routing]
compaction_model = "compactor"
strategy = "cost_first"

# --- Supervisor ---

[supervisor]
max_iterations = 50
max_retries_per_task = 3
timeout_seconds = 7200
# verification_command = "pytest tests/"

# --- Failover chains ---

[failover]
classification = ["classifier", "light_reasoner", "cloud_fast"]
coding = [
    "light_coder",
    "cloud_fast",
    "cloud_mini",
    "cloud_reasoner",
    "cloud_coder",
]
compaction = ["compactor", "light_reasoner", "cloud_mini"]
evaluation = ["light_reasoner", "light_reasoner_backup"]
planning = ["light_reasoner", "light_reasoner_backup"]
reasoning = [
    "light_reasoner",
    "light_reasoner_backup",
    "cloud_reasoner",
    "cloud_coder",
]

# --- Failover behavior ---
# Controls how failures are handled before walking the failover chains above.

[failover.behavior]
# F1 (rate limit) + F6 (timeout): retry same model before moving on
retry_same_attempts = 2
retry_same_backoff_ms = 1000

# F1: honor retry-after header; if missing, wait this long
rate_limit_default_wait_ms = 5000
rate_limit_max_wait_ms = 30000

# F6: how long before a request is considered timed out
timeout_ms = 30000

# F5 (auth failure): never retry, surface error immediately
# F7 (quality failure): never retry same model, walk chain immediately
# F2 (quota exhausted): walk chain immediately (waiting won't help)
# F3 (unavailable) + F4 (not found): walk chain immediately
# F8 (context overflow): walk chain (need larger context model)

# --- Agent roles ---

[roles.coder]
instructions = "You are a specialist coding agent. Implement the described change completely. Write clean, correct code. Commit your work when done."
nickname = "Coder"

[roles.reviewer]
instructions = "You are a code reviewer. Review the diff for bugs, security issues, and style problems. Do not modify files. Report issues with file path and line number."
nickname = "Reviewer"

[roles.test_runner]
instructions = "Run the specified test command and interpret the results. Report which tests passed, failed, and why. Do not modify source files."
nickname = "Test Runner"

# --- CLI binaries ---

[cli]
# Path to claude CLI binary. Default: "claude" (on PATH).
# VS Code extension installs it at ~/.vscode-server/extensions/anthropic.claude-code-*/resources/native-binary/claude
claude = "claude"

# --- Usage preservation ---

[usage]
prefer_secondary = true
primary_warn_threshold = 0.7
